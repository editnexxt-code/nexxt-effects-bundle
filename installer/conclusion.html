<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: transparent;
    margin: 0;
    padding: 20px 28px;
    color: #1a1a2e;
  }
  h1 { font-size: 22px; font-weight: 800; margin: 0 0 10px 0; color: #10b981; }
  p { font-size: 13px; line-height: 1.6; color: #444; margin: 8px 0; }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin: 8px 0;
    font-size: 13px;
  }
  .num {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <h1>Instalação Concluída!</h1>
  <p>O Nexxt Effects Bundle foi instalado com sucesso.</p>
  <p style="margin-top:14px; font-weight:700; font-size:12px; color:#888; text-transform:uppercase; letter-spacing:0.5px;">Próximos passos:</p>
  <div class="step"><div class="num">1</div><span>Abra o <strong>Adobe Premiere Pro</strong></span></div>
  <div class="step"><div class="num">2</div><span>Acesse <strong>Window → Extensions → Nexxt Effects</strong></span></div>
  <div class="step"><div class="num">3</div><span>Configure sua chave <strong>Groq API</strong> nas Configurações do plugin</span></div>
</body>
</html>
